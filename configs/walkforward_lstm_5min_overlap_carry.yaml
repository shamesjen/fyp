paths:
  dataset_path: data/processed/spy_5min_walkforward_h1_dataset_carry_local.npz
  output_dir: artifacts/experiments/carry_model_family_suite/plain_lstm

training:
  random_seed: 7
  batch_size: 256
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip: 1.0
  early_stopping_patience: 4
  early_stopping_min_delta: 0.0
  loss: huber
  shuffle_train: true

model:
  hidden_size: 128
  num_layers: 2
  dropout: 0.10

hooks:
  vega_weighted_loss: false
  smoothness_penalty: 0.05
  no_arb_penalty: 0.0
  shape_projection:
    enabled: true
    n_components: 3

walkforward:
  initial_train_size: 17630
  val_size: 3526
  test_size: 3526
  step_size: 1763
  stitch_mode: frontier
  save_fold_artifacts: false

backtest:
  maturity_bucket_days: 30
  signal_threshold: 0.0015
  transaction_cost_bps: 1.0
  holding_period_bars: 1
  allow_overlapping_positions: true
