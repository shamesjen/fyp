paths:
  execution_backtest_config: configs/backtest_execution_5min.yaml
  output_root: artifacts/reports/best_model_vs_all_baselines_evaluations_svi
  report_path: artifacts/reports/best_model_vs_all_baselines_evaluations_svi.md

best_model:
  name: elastic_net_baseline
  family: baseline
  horizon: 1
  threshold: 0.0015
  predictions_path: artifacts/experiments/svi_all_baselines_overlap_seq12_h1/seed_7/elastic_net_baseline/stitched_test_predictions.csv
  backtest_dir: artifacts/experiments/svi_all_baselines_overlap_seq12_h1/seed_7/elastic_net_baseline/backtest

baseline_discovery:
  root: artifacts/experiments/svi_all_baselines_overlap_seq12_h1/seed_7
  prediction_suffix: stitched_test_predictions.csv
  recursive: true
  exclude_names:
    - elastic_net_baseline

regime:
  method: atm_iv_median

execution_scenarios:
  - name: base
    description: Reuse the calibrated execution assumptions from the standardized comparison.
    overrides: {}
  - name: wide_spread
    description: Wider quoted spread, holding other frictions fixed.
    overrides:
      execution:
        half_spread_bps_per_side: 7.0
  - name: latency_proxy
    description: Higher slippage and impact to proxy stale execution and queue loss.
    overrides:
      execution:
        slippage_bps_per_side: 4.5
        impact_bps_per_side: 3.5
  - name: wide_spread_plus_latency
    description: Combined spread and latency stress.
    overrides:
      execution:
        half_spread_bps_per_side: 7.0
        slippage_bps_per_side: 4.5
        impact_bps_per_side: 3.5
