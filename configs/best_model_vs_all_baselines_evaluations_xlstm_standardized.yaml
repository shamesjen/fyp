paths:
  group_root: artifacts/experiments/xlstm_5min_best/standardized_with_refreshed_baselines/seq12_h1_xlstm_all_refreshed_baselines
  execution_backtest_config: configs/backtest_execution_5min.yaml
  output_root: artifacts/reports/xlstm_vs_all_baselines_evaluations
  report_path: artifacts/reports/xlstm_vs_all_baselines_evaluations.md

best_model:
  name: xlstm_b2_e128_mps
  family: xlstm
  horizon: 1
  threshold: 0.0015
  predictions_path: artifacts/experiments/xlstm_5min_best/standardized_with_refreshed_baselines/seq12_h1_xlstm_all_refreshed_baselines/xlstm_b2_e128_mps_standardized_predictions.csv
  backtest_dir: artifacts/experiments/xlstm_5min_best/standardized_with_refreshed_baselines/seq12_h1_xlstm_all_refreshed_baselines/xlstm_b2_e128_mps

baseline_discovery:
  root: artifacts/experiments/xlstm_5min_best/standardized_with_refreshed_baselines/seq12_h1_xlstm_all_refreshed_baselines
  prediction_suffix: _standardized_predictions.csv
  include_prefix: refreshed_

regime:
  method: atm_iv_median

execution_scenarios:
  - name: base
    description: Reuse the calibrated execution assumptions from the standardized comparison.
    overrides: {}
  - name: wide_spread
    description: Wider quoted spread, holding other frictions fixed.
    overrides:
      execution:
        half_spread_bps_per_side: 7.0
  - name: latency_proxy
    description: Higher slippage and impact to proxy stale execution and queue loss.
    overrides:
      execution:
        slippage_bps_per_side: 4.5
        impact_bps_per_side: 3.5
  - name: wide_spread_plus_latency
    description: Combined spread and latency stress.
    overrides:
      execution:
        half_spread_bps_per_side: 7.0
        slippage_bps_per_side: 4.5
        impact_bps_per_side: 3.5
