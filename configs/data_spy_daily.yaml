paths:
  raw_underlying_path: data/raw/spy_underlying_daily.csv
  raw_options_panel_path: data/raw/spy_options_iv_panel.csv
  processed_panel_path: data/processed/spy_daily_iv_panel.parquet
  dataset_path: data/processed/spy_daily_dataset.npz
  dataset_metadata_path: data/processed/spy_daily_dataset.metadata.json
  sample_underlying_path: data/samples/spy_underlying_sample.csv
  sample_panel_path: data/samples/spy_iv_panel_sample.csv
  prepared_panel_path: data/samples/spy_iv_panel_sample.csv

data:
  symbol: SPY
  start_date: 2024-02-01
  end_date: 2024-04-03
  seq_len: 10
  maturity_bucket_days: 30
  maturity_tolerance_days: 7
  risk_free_rate: 0.02
  moneyness_grid: [-0.15, -0.10, -0.05, 0.0, 0.05, 0.10, 0.15]

providers:
  underlying:
    type: yfinance
    interval: 1d
    auto_fallback_to_csv: true
  options:
    type: alpaca
    contract_status: auto
    strike_moneyness_buffer: 0.03
    max_unique_expirations: 4
    strikes_per_grid_point: 2
    contracts_limit: 1000
    auto_fallback_to_csv: true
    trading_base_url: https://paper-api.alpaca.markets

feature_engineering:
  realized_vol_window: 5
  include_atm_iv: true
  include_underlying_returns: true
  include_realized_vol: true
  include_dte: true
